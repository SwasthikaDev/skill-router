name: keep-warm

# Render's free tier sleeps a service after ~15 minutes idle, and the first
# request after that takes ~50s. This pings every submission's /health every
# 5 minutes so a grading agent never hits a cold start. Scheduled Actions can
# be delayed under load, so 5 minutes buffers against the 15-minute sleep.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all services
        run: |
          for u in \
            https://aiagent-dns.onrender.com/health \
            https://skill-router.onrender.com/health \
            https://ask-a-human.onrender.com/health \
            https://fairdraw-6byf.onrender.com/health; do
            code=$(curl -sS -m 60 -o /dev/null -w "%{http_code}" "$u" || echo "000")
            echo "$u -> $code"
          done
